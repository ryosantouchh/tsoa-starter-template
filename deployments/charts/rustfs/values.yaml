namespace: ""
environment: ""

image:
  repository: rustfs/rustfs
  tag: latest
  pullPolicy: IfNotPresent

port: 9000
consolePort: 9001

ingress:
  enabled: false
  className: traefik
  host: ""

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "250m"

affinity: {}

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""

secret:
  accessKey: ""
  secretKey: ""
