apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres-headless
  namespace: {{ .Values.namespace }}
spec:
  clusterIP: None
  selector:
    app: {{ .Release.Name }}-postgres
  ports:
    - name: postgres
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres-svc
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-postgres
  ports:
    - name: postgres
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
  type: ClusterIP
